apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matomo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AlirezaMohammadpour85/ArgoCD_Test2.git
    targetRevision: matomo
    path: charts/matomo
    helm:
      releaseName: matomo
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: matomo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true