apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.database.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.database.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: {{ .Values.database.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.database.port }}
      targetPort: mysql
      name: mysql
      appProtocol: mysql
      nodePort: {{ .Values.database.nodePort }}
