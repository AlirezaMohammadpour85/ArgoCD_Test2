apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-{{ .Values.database.name }}-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.database.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.database.port }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-{{ .Values.database.name }}-egress
spec:
  podSelector:
    matchLabels:
      networking/allow-matomo-mysql: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Values.database.name }}
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.database.port }}
