apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.name }}-egress-network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
      app.kubernetes.io/version: {{ .Values.image.tag | quote }}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.network.matomoEgressCidr }}
      ports:
        - port: 443
        - port: 80
