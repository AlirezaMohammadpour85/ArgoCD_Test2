kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ .Values.name }}-data
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: {{ .Values.image.tag | quote }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  volumeMode: Filesystem
